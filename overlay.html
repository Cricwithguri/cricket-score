<!DOCTYPE html>
<html>

<head>

<style>

body{
background:transparent;
font-family:Arial;
}

.scorebox{
background:#111827;
color:white;
padding:12px;
border-radius:10px;
width:260px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.teams{
font-size:18px;
font-weight:bold;
}

.score{
font-size:28px;
color:#22c55e;
}

.controls button{
margin:3px;
padding:6px 8px;
border:none;
background:#2563eb;
color:white;
border-radius:4px;
cursor:pointer;
}

.controls button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div class="scorebox">

<div class="teams">
<span id="team1">GT</span> vs
<span id="team2">KKR</span>
</div>

<div class="score" id="score">
0/0
</div>

<div id="overs">
0.0 overs
</div>

</div>

<br>

<div class="controls">

<button onclick="run(1)">+1</button>
<button onclick="run(2)">+2</button>
<button onclick="run(4)">4</button>
<button onclick="run(6)">6</button>
<button onclick="wicket()">Wicket</button>
<button onclick="ball()">Ball</button>

</div>

<script>

let runs=0
let wickets=0
let balls=0

function update(){

document.getElementById("score").innerText=
runs+"/"+wickets

let over=Math.floor(balls/6)
let ball=balls%6

document.getElementById("overs").innerText=
over+"."+ball+" overs"

}

function run(r){

runs+=r
balls++
update()

}

function wicket(){

wickets++
balls++
update()

}

function ball(){

balls++
update()

}

</script>

</body>

</html>
