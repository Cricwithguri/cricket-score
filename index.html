<!DOCTYPE html>
<html>
<head>
<title>Live Cricket Score</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

.scoreboard{
margin-top:150px;
}

.score{
font-size:60px;
color:#22c55e;
}

</style>

</head>

<body>

<div class="scoreboard">

<h1>IND vs AUS</h1>

<div class="score" id="runs">
152/3
</div>

<p id="overs">17.2 overs</p>
  
<p>Kohli 45 (32)</p>
<p>Rohit 30 (21)</p>

</div>
<script>

setInterval(function(){

fetch("score.json")
.then(response => response.json())
.then(data => {

document.getElementById("runs").innerText = data.score;
document.getElementById("overs").innerText = data.overs;

});

},5000);

</script>
</body>
</html>
