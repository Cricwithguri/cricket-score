<!DOCTYPE html>
<html>

<head>

<title>Live Cricket Score</title>

<style>

body{
background:linear-gradient(135deg,#0f172a,#020617);
font-family:Arial;
color:white;
text-align:center;
}

.container{
width:420px;
margin:auto;
margin-top:120px;
background:#111827;
padding:30px;
border-radius:16px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.score{
font-size:64px;
color:#22c55e;
animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}

}
.ball{

background:#1e293b;
padding:8px 12px;
border-radius:8px;
margin:4px;
display:inline-block;
animation:fade 0.5s ease;

}

@keyframes fade{

from{opacity:0;transform:translateY(-5px)}
to{opacity:1}

}
.match{
font-size:28px;
margin-bottom:10px;
}
</style>

</head>

<body>

<div class="container">

<div class="match">
IND vs AUS
</div>

<div class="score" id="runs">
152/3
</div>

<div class="overs" id="overs">
17.2 overs
</div>

<div class="players">

<p id="bat1">Kohli 45 (32)</p>

<p id="bat2">Rohit 30 (21)</p>

</div>

<h3>Last Over</h3>

<div class="balls" id="balls">

<span class="ball">1</span>
<span class="ball">4</span>
<span class="ball">0</span>
<span class="ball">2</span>
<span class="ball">1</span>
<span class="ball">6</span>

</div>

</div>

<script>
  
setInterval(function(){

https://api.cricapi.com/v1/currentMatches?apikey=d9f084e7-2731-43ea-b5da-fc01601f9abf&offset=0")

.then(res => res.json())

.then(data => {

let liveMatch = data.data.find(m => m.matchStarted == true)

document.querySelector(".match").innerText =
liveMatch.teamInfo[0].shortname + " vs " +
liveMatch.teamInfo[1].shortname

document.getElementById("runs").innerText =
liveMatch.score[0].r + "/" + liveMatch.score[0].w

document.getElementById("overs").innerText =
liveMatch.score[0].o + " overs"

})

},5000)

</script>

</body>

</html>
