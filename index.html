<!DOCTYPE html>
<html>

<head>

<title>Live Cricket Score</title>

<style>

body{
background:linear-gradient(135deg,#0f172a,#020617);
font-family:Arial;
color:white;
text-align:center;
}

.container{
width:420px;
margin:auto;
margin-top:120px;
background:#111827;
padding:30px;
border-radius:16px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.score{
font-size:64px;
color:#22c55e;
animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}

}
.ball{

background:#1e293b;
padding:8px 12px;
border-radius:8px;
margin:4px;
display:inline-block;
animation:fade 0.5s ease;

}

@keyframes fade{

from{opacity:0;transform:translateY(-5px)}
to{opacity:1}

}
.match{
font-size:28px;
margin-bottom:10px;
}
</style>

</head>

<body>

<div class="container">

<div class="match">
IND vs AUS
</div>

<div class="score" id="runs">
152/3
</div>

<div class="overs" id="overs">
17.2 overs
</div>

<div class="players">

<p id="bat1">Batsman 1</p>
<p id="bat2">Batsman 2</p>

</div>

<h3>Last Over</h3>

<div class="balls" id="balls">

<span class="ball">1</span>
<span class="ball">4</span>
<span class="ball">0</span>
<span class="ball">2</span>
<span class="ball">1</span>
<span class="ball">6</span>

</div>
  
<script>

setInterval(function(){

fetch("https://api.cricapi.com/v1/currentMatches?apikey=d9f084e7-2731-43ea-b5da-fc01601f9abf&offset=0")

.then(res => res.json())

.then(data => {

let match = data.data[0]

document.querySelector(".match").innerText = match.name

document.getElementById("runs").innerText =
match.score[0].r + "/" + match.score[0].w

document.getElementById("overs").innerText =
(match.score[0].o || match.score[0].overs) + " overs"

document.getElementById("bat1").innerText =
match.score[0].inning

document.getElementById("bat2").innerText =
"Match Type: " + match.matchType

})

.catch(err => console.log(err))

},5000)

</script>
</body>

</html>
